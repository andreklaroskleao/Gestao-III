<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gestão Comercial</title>
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <section id="login-screen" class="auth-shell active">
    <div class="auth-card">
      <h1>Gestão Comercial</h1>
      <p>Entre com sua conta para acessar o sistema.</p>

      <form id="login-form" class="form-grid" style="grid-template-columns:1fr;">
        <label>
          E-mail
          <input type="email" name="email" required />
        </label>

        <label>
          Senha
          <input type="password" name="password" required />
        </label>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Entrar</button>
        </div>
      </form>
    </div>
  </section>

  <section id="app-screen" class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-block">
          <div class="brand-title" id="store-name-side">Minha Loja</div>
          <div class="brand-subtitle">Gestão Comercial</div>
        </div>
        <button class="sidebar-toggle desktop-only" id="sidebar-toggle" type="button">☰</button>
      </div>

      <div class="sidebar-user">
        <strong id="current-user-name">Usuário</strong>
        <span>Conta autenticada</span>
      </div>

      <nav id="main-nav" class="nav-list">
        <button class="nav-item active" data-tab="dashboard" type="button">
          <span class="nav-item-icon">🏠</span>
          <span class="nav-item-label">Dashboard</span>
        </button>

        <button class="nav-item" data-tab="sales" type="button">
          <span class="nav-item-icon">💳</span>
          <span class="nav-item-label">Vendas</span>
        </button>

        <button class="nav-item" data-tab="products" type="button">
          <span class="nav-item-icon">📦</span>
          <span class="nav-item-label">Produtos</span>
        </button>

        <button class="nav-item" data-tab="reports" type="button">
          <span class="nav-item-icon">📊</span>
          <span class="nav-item-label">Relatórios</span>
        </button>

        <button class="nav-item" data-tab="deliveries" type="button">
          <span class="nav-item-icon">🛵</span>
          <span class="nav-item-label">Tele-entregas</span>
        </button>

        <button class="nav-item" data-tab="clients" type="button">
          <span class="nav-item-icon">👥</span>
          <span class="nav-item-label">Clientes</span>
        </button>

        <button class="nav-item" data-tab="suppliers" type="button">
          <span class="nav-item-icon">🏭</span>
          <span class="nav-item-label">Fornecedores</span>
        </button>

        <button class="nav-item" data-tab="purchases" type="button">
          <span class="nav-item-icon">🧾</span>
          <span class="nav-item-label">Compras</span>
        </button>

        <button class="nav-item" data-tab="payables" type="button">
          <span class="nav-item-icon">💰</span>
          <span class="nav-item-label">Contas a pagar</span>
        </button>

        <button class="nav-item" data-tab="users" type="button">
          <span class="nav-item-icon">🔐</span>
          <span class="nav-item-label">Usuários</span>
        </button>

        <button class="nav-item" data-tab="settings" type="button">
          <span class="nav-item-icon">⚙️</span>
          <span class="nav-item-label">Configurações</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-secondary" type="button">Sair</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle mobile-only" id="mobile-sidebar-toggle" type="button">☰</button>
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle">Área: Dashboard.</p>
        </div>

        <div class="topbar-actions">
          <div class="alert-anchor">
            <button id="stock-alert-btn" class="btn btn-secondary icon-badge" type="button">
              🔔
              <span id="stock-alert-count" class="icon-badge-count">0</span>
            </button>

            <div id="alerts-panel" class="alerts-panel hidden">
              <div class="section-header" style="margin-bottom:10px;">
                <h3>Alertas</h3>
              </div>
              <div id="stock-alert-list"></div>
            </div>
          </div>

          <button id="install-app-btn" class="btn btn-secondary hidden" type="button">Instalar app</button>
        </div>
      </div>

      <div class="content">
        <section id="tab-dashboard" class="tab-panel active"></section>
        <section id="tab-sales" class="tab-panel"></section>
        <section id="tab-products" class="tab-panel"></section>
        <section id="tab-reports" class="tab-panel"></section>
        <section id="tab-deliveries" class="tab-panel"></section>
        <section id="tab-clients" class="tab-panel"></section>
        <section id="tab-suppliers" class="tab-panel"></section>
        <section id="tab-purchases" class="tab-panel"></section>
        <section id="tab-payables" class="tab-panel"></section>
        <section id="tab-users" class="tab-panel"></section>
        <section id="tab-settings" class="tab-panel"></section>
      </div>
    </main>
  </section>

  <div id="modal-root"></div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
